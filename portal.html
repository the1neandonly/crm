<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace Client — DevelopTheOne</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#2f6fed;--brand2:#5b8cff;--ink:#0e1626;--muted:#5a6b85;--muted2:#93a1ba;--line:#e5e9f0;--bg:#f4f7fc;--card:#ffffff;--good:#16a34a;--warn:#d97706;--bad:#dc2626}
body{font-family:'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:940px;margin:0 auto;padding:0 18px 60px}
.hero{background:linear-gradient(135deg,#2f6fed,#1c4fd1);color:#fff;padding:38px 30px 46px;border-radius:0 0 26px 26px;box-shadow:0 20px 50px -24px rgba(47,111,237,.7);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-brand{font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:.85;font-weight:700}
.hero h1{font-size:26px;font-weight:800;margin-top:8px}
.hero .sub{opacity:.9;font-size:14px;margin-top:6px}
.hero .upd{position:absolute;top:20px;right:24px;font-size:11.5px;opacity:.8;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px}
.grid2{display:grid;grid-template-columns:260px 1fr;gap:18px;margin-top:-26px;position:relative;z-index:2}
@media(max-width:720px){.grid2{grid-template-columns:1fr}.hero .upd{position:static;display:inline-block;margin-top:12px}}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 12px 34px -22px rgba(20,40,80,.28)}
.card h3{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;font-weight:800}
.ring-card{text-align:center}
.ring{position:relative;width:150px;height:150px;margin:6px auto 4px}
.ring .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .lbl b{font-size:34px;font-weight:800;color:var(--brand)}
.ring .lbl span{font-size:11px;color:var(--muted);letter-spacing:1px}
.obj{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .t{flex:1;font-size:14px;font-weight:600}
.row .d{font-size:12px;color:var(--muted2)}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-done{background:#dcfce7;color:var(--good)}
.b-prog{background:#dbeafe;color:var(--brand)}
.b-wait{background:#f1f5f9;color:var(--muted)}
.b-late{background:#fee2e2;color:var(--bad)}
.post{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.post:last-child{border-bottom:none}
.post .dt{width:52px;flex-shrink:0;text-align:center}
.post .dt b{display:block;font-size:18px;font-weight:800;color:var(--brand);line-height:1}
.post .dt span{font-size:10px;color:var(--muted2);text-transform:uppercase}
.post .cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.post .pt{flex:1;font-size:13.5px;font-weight:600}
.post .pc{font-size:11px;color:var(--muted2)}
.inv{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
.inv:last-child{border-bottom:none}
.inv .amt{font-weight:800;font-size:15px}
.cta{background:linear-gradient(135deg,#22c07d,#16a34a);color:#fff;text-align:center;padding:22px;border-radius:18px;margin-top:18px}
.cta h3{color:rgba(255,255,255,.85)}
.cta a{display:inline-block;margin-top:6px;background:#fff;color:var(--good);text-decoration:none;font-weight:800;padding:11px 24px;border-radius:12px;font-size:14px}
.empty{color:var(--muted2);font-size:13px;padding:10px 0;font-style:italic}
.ft{text-align:center;color:var(--muted2);font-size:11.5px;margin-top:34px;line-height:1.9}
.state{max-width:440px;margin:16vh auto;text-align:center;padding:0 20px}
.state .ic{font-size:52px}
.state h2{font-size:20px;margin:14px 0 8px}
.state p{color:var(--muted);font-size:14px}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div class="state"><div class="spin"></div><p style="margin-top:16px;color:var(--muted)">Chargement de votre espace...</p></div></div>
<script>
var SUPA_URL="https://kfoftberdejuiiemmjpr.supabase.co";
var SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtmb2Z0YmVyZGVqdWlpZW1tanByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODA3MjEsImV4cCI6MjA5ODg1NjcyMX0.OJ9wzzbu8s7RfuvAV2i-ngCLvkccgZ-owFdmsGA5j6o";
function b64d(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){return (+n||0).toLocaleString('fr-FR')+" DA";}
function state(ic,h,p){document.getElementById("app").innerHTML='<div class="state"><div class="ic">'+ic+'</div><h2>'+h+'</h2><p>'+p+'</p></div>';}
function qs(k){var m=location.search.match(new RegExp("[?&]"+k+"=([^&]+)"));return m?decodeURIComponent(m[1]):"";}
function frag(k){var h=location.hash.replace(/^#/,"");var m=h.match(new RegExp("(?:^|&)"+k+"=([^&]+)"));return m?decodeURIComponent(m[1]):"";}
var MONTHS=["janv","fevr","mars","avr","mai","juin","juil","aout","sept","oct","nov","dec"];
function invBadge(s){s=(s||"").toLowerCase();if(s.indexOf("impay")>=0)return '<span class="badge b-wait">A payer</span>';if(s.indexOf("retard")>=0)return '<span class="badge b-late">En retard</span>';if(s.indexOf("pay")>=0)return '<span class="badge b-done">Payee</span>';return '<span class="badge b-wait">A payer</span>';}
function projBadge(s){s=(s||"").toLowerCase();if(["livre","pret","complets"].some(function(x){return s.indexOf(x)>=0;}))return '<span class="badge b-done">Termine</span>';if(["cours","revision","kickoff","acces"].some(function(x){return s.indexOf(x)>=0;}))return '<span class="badge b-prog">En cours</span>';return '<span class="badge b-wait">'+esc(s||"A venir")+'</span>';}
function render(d){var prog=Math.max(0,Math.min(100,+d.progress||0));var R=64,C=2*Math.PI*R,off=C-(prog/100)*C;
 var updDate=d.updated?d.updated.split("-").reverse().join("/"):"";
 var h='<div class="hero"><div class="upd">Mis a jour le '+esc(updDate)+'</div><div class="hero-brand">'+esc(d.agency||"DevelopTheOne")+' · Espace Client</div><h1>Bonjour, '+esc(d.client||"")+' 👋</h1><div class="sub">Le suivi de votre projet, en temps reel.</div></div>';
 h+='<div class="wrap"><div class="grid2">';
 h+='<div class="card ring-card"><h3>Avancement</h3><div class="ring"><svg width="150" height="150"><circle cx="75" cy="75" r="'+R+'" fill="none" stroke="#e9eef7" stroke-width="12"/><circle cx="75" cy="75" r="'+R+'" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'" transform="rotate(-90 75 75)"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f6fed"/><stop offset="1" stop-color="#5b8cff"/></linearGradient></defs></svg><div class="lbl"><b>'+prog+'%</b><span>REALISE</span></div></div>'+(d.objective?'<div class="obj">🎯 '+esc(d.objective)+'</div>':'')+'</div>';
 // projects
 h+='<div class="card"><h3>Votre projet</h3>'+((d.projects&&d.projects.length)?d.projects.map(function(p){return '<div class="row"><div class="t">'+esc(p.t)+(p.d?'<div class="d">Echeance : '+esc(p.d)+'</div>':'')+'</div>'+projBadge(p.s)+'</div>';}).join(""):'<div class="empty">Projet en cours de preparation.</div>')+'</div>';
 h+='</div>';
 // content calendar
 if(d.posts&&d.posts.length){h+='<div class="card" style="margin-top:18px"><h3>📅 Votre calendrier de contenu</h3>'+d.posts.map(function(p){var dd=(p.date||"").split("-");var day=dd[2]||"",mon=MONTHS[(+dd[1]||1)-1]||"";var cc={"Instagram":"#e879b9","Facebook":"#5b8cff","TikTok":"#22c07d","LinkedIn":"#2f6fed","Story":"#ff8a5c","YouTube":"#f4685f","Blog":"#f5b940","Email":"#a78bfa"}[p.ch]||"#8fa2c4";return '<div class="post"><div class="dt"><b>'+day+'</b><span>'+mon+'</span></div><span class="cdot" style="background:'+cc+'"></span><div class="pt">'+esc(p.t||p.ch||"Post")+'<div class="pc">'+esc(p.ch||"")+'</div></div>'+(p.st==="Publie"?'<span class="badge b-done">Publie</span>':'<span class="badge b-prog">A venir</span>')+'</div>';}).join("")+'</div>';}
 // invoices
 if(d.invoices&&d.invoices.length){h+='<div class="card" style="margin-top:18px"><h3>💳 Facturation</h3>'+d.invoices.map(function(i){return '<div class="inv"><div><div style="font-weight:600;font-size:14px">'+esc(i.d||"Prestation")+'</div>'+(i.due?'<div class="d" style="font-size:12px;color:var(--muted2)">Echeance : '+esc(i.due)+'</div>':'')+'</div><div style="text-align:right"><div class="amt">'+money(i.a)+'</div>'+invBadge(i.s)+'</div></div>';}).join("")+'</div>';}
 // note
 if(d.note){h+='<div class="card" style="margin-top:18px"><h3>Message de votre equipe</h3><div style="font-size:14px;color:var(--ink);line-height:1.6;white-space:pre-wrap">'+esc(d.note)+'</div></div>';}
 // CTA
 var wa=d.contactWa?("https://wa.me/"+String(d.contactWa).replace(/\D/g,"")):("mailto:"+(d.contactEmail||""));
 h+='<div class="cta"><h3>UNE QUESTION ?</h3><div style="font-size:15px;font-weight:700">Votre equipe est la pour vous</div><a href="'+esc(wa)+'" target="_blank" rel="noopener">💬 Nous contacter</a></div>';
 h+='<div class="ft">Espace client chiffre · '+esc(d.agency||"DevelopTheOne")+'<br>Sites web · SEO · Publicite · Automatisation IA</div></div>';
 document.getElementById("app").innerHTML=h;
 document.title="Espace Client — "+(d.client||"DevelopTheOne");}
function boot(){var t=qs("t"),k=frag("k");if(!t||!k){return state("🔒","Lien invalide","Ce lien d'acces est incomplet ou a expire. Demandez-en un nouveau a votre agence.");}
 fetch(SUPA_URL+"/rest/v1/workspaces?id=eq.portal-"+encodeURIComponent(t)+"&select=data",{headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY}}).then(function(r){if(!r.ok)throw new Error("net");return r.json();}).then(function(rows){
  if(!rows[0]||!rows[0].data||!rows[0].data.ct)throw new Error("gone");var d=rows[0].data;
  return crypto.subtle.importKey("raw",b64d(k),{name:"AES-GCM"},false,["decrypt"]).then(function(key){return crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(d.iv)},key,b64d(d.ct));}).then(function(pt){render(JSON.parse(new TextDecoder().decode(pt)));});
 }).catch(function(e){if(e.message==="gone")state("⏳","Espace introuvable","Ce portail n'existe plus ou a ete revoque par votre agence.");else state("🔐","Acces impossible","Impossible de dechiffrer cet espace. Le lien est peut-etre incomplet.");});}
boot();
</script>
</body>
</html>
