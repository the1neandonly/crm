<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevelopTheOne — Agency OS</title>
<style>
:root{--brand:#2f6fed;--brand-2:#5b8cff;--brand-dark:#1c4fd1;--bg:#070b13;--bg2:#0a1020;--surface:#111a2e;--surface2:#16223b;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.15);--txt:#eaf0fb;--muted:#8fa2c4;--muted2:#5f7096;--good:#22c07d;--warn:#f5b940;--bad:#f4685f;--purple:#a78bfa;--gold:#ffcf5c;--shadow:0 24px 60px -30px rgba(0,0,0,.9)}
html[data-theme="light"]{--bg:#eef2f8;--bg2:#e6ecf5;--surface:#ffffff;--surface2:#f2f6fb;--line:rgba(10,20,40,.10);--line2:rgba(10,20,40,.18);--txt:#0e1626;--muted:#5a6b85;--muted2:#93a1ba;--shadow:0 24px 60px -34px rgba(20,40,80,.35)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',Tahoma,-apple-system,Roboto,sans-serif;color:var(--txt);overflow:hidden;background:radial-gradient(1200px 600px at 82% -12%,rgba(47,111,237,.16),transparent 60%),var(--bg);transition:background .3s}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:linear-gradient(var(--brand),var(--brand-dark));border-radius:9px}::-webkit-scrollbar-track{background:transparent}
::selection{background:rgba(47,111,237,.4)}
.app{display:grid;grid-template-columns:250px 1fr;height:100vh}
[dir="rtl"] .app{grid-template-columns:1fr 250px}
.side{background:linear-gradient(180deg,var(--bg2),var(--bg));border-inline-end:1px solid var(--line);display:flex;flex-direction:column;padding:16px 14px;gap:3px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 6px 12px}
.brand img{max-width:170px;max-height:42px;object-fit:contain}
.me{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.16s}
.me:hover{border-color:var(--brand)}
.me .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.me .mn{font-size:12.5px;font-weight:700}.me .mr{font-size:10.5px;color:var(--muted2)}.me .sw{margin-inline-start:auto;font-size:10px;color:var(--muted2)}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);padding:12px 12px 5px}
.nav-item{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:11px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;transition:.16s;border:1px solid transparent}
.nav-item:hover{background:var(--surface);color:var(--txt)}
.nav-item.active{background:linear-gradient(90deg,rgba(47,111,237,.24),rgba(47,111,237,.05));color:var(--txt);border-color:rgba(47,111,237,.35)}
.nav-item .ic{width:17px;height:17px;flex-shrink:0}
.nav-item .badge{margin-inline-start:auto;background:var(--surface2);border:1px solid var(--line);font-size:10.5px;font-weight:700;padding:1px 8px;border-radius:20px;color:var(--muted)}
.nav-item.active .badge{background:var(--brand);color:#fff;border-color:transparent}.nav-item .badge.red{background:var(--bad);color:#fff;border-color:transparent}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:6px;padding-top:12px}
.mini-btn{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:10px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.16s}
.mini-btn:hover{color:var(--txt);border-color:var(--line2)}.mini-btn svg{width:14px;height:14px}
.kbd{font-size:10px;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin-inline-start:auto;color:var(--muted2)}
.langs{display:flex;gap:5px}
.langs .lg{flex:1;text-align:center;padding:6px;border-radius:8px;background:var(--surface);border:1px solid var(--line);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
.langs .lg.on{background:var(--brand);color:#fff;border-color:transparent}
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:16px 30px;border-bottom:1px solid var(--line)}
.topbar h1{font-size:21px;font-weight:800}.topbar .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
.toggle-mine{display:flex;align-items:center;gap:8px;margin-inline-start:auto;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
.toggle-mine.on{background:rgba(47,111,237,.15);border-color:var(--brand);color:var(--txt)}
.iconbtn{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.iconbtn:hover{border-color:var(--brand)}
.cmdk{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 14px;color:var(--muted);font-size:12.5px;cursor:pointer}
.cmdk:hover{border-color:var(--brand);color:var(--txt)}.cmdk svg{width:15px;height:15px}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;border:none;cursor:pointer;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:700;transition:.16s;box-shadow:0 10px 24px -12px var(--brand)}
.btn:hover{background:var(--brand-dark);transform:translateY(-1px)}
.btn.ghost{background:var(--surface);color:var(--txt);border:1px solid var(--line);box-shadow:none}.btn.ghost:hover{border-color:var(--line2)}
.btn.danger{background:transparent;color:var(--bad);border:1px solid rgba(244,104,95,.3);box-shadow:none;margin-inline-end:auto}.btn.danger:hover{background:rgba(244,104,95,.1)}
.btn svg{width:16px;height:16px}.btn.sm{padding:8px 13px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:22px 30px 60px}
.fade{animation:fade .35s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:18px}
.stat{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:18px;padding:18px;position:relative;overflow:hidden}
.stat .lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat .val{font-size:29px;font-weight:800;margin-top:7px}.stat .val small{font-size:14px;color:var(--muted);font-weight:600}
.stat .chg{font-size:11.5px;margin-top:5px;font-weight:600;color:var(--muted)}.stat .chg.up{color:var(--good)}.stat .chg.down{color:var(--bad)}
.stat .ic{position:absolute;inset-inline-end:16px;top:16px;width:32px;height:32px;border-radius:10px;background:rgba(47,111,237,.15);display:flex;align-items:center;justify-content:center;color:var(--brand-2)}.stat .ic svg{width:17px;height:17px}
.row2{display:grid;grid-template-columns:1.3fr 1fr;gap:15px;margin-bottom:15px}
.panel{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:18px;padding:20px}
.panel h3{font-size:14px;font-weight:700;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.panel h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--brand)}
.panel h3 .tag{margin-inline-start:auto;font-size:10.5px;font-weight:700;color:var(--brand-2);background:rgba(47,111,237,.12);padding:2px 9px;border-radius:20px}
.panel h3 .act{margin-inline-start:auto;font-size:11px;color:var(--brand-2);cursor:pointer;font-weight:700}
.nba{display:flex;flex-direction:column;gap:9px}
.nba-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:var(--bg);border:1px solid var(--line);cursor:pointer;transition:.16s}
.nba-item:hover{border-color:var(--brand)}
.nba-rank{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;color:#fff}
.nba-txt{font-size:13px;font-weight:600;line-height:1.35}.nba-txt small{display:block;color:var(--muted2);font-weight:500;font-size:11px;margin-top:2px}
.nba-val{margin-inline-start:auto;font-size:12px;font-weight:800;color:var(--good);white-space:nowrap}
.funnel{display:flex;flex-direction:column;gap:7px}.fbar{display:flex;align-items:center;gap:12px}.fbar .flabel{font-size:12px;color:var(--muted);width:100px;flex-shrink:0}
.fbar .ftrack{flex:1;height:28px;background:var(--bg);border-radius:8px;overflow:hidden}
.fbar .ffill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--brand),var(--brand-2));display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;color:#fff;min-width:34px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.goal-ring{display:flex;align-items:center;gap:18px}.ring{position:relative;width:96px;height:96px;flex-shrink:0}.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}.ring .rt b{font-size:20px;font-weight:800}
.goal-info{flex:1}.goal-info .gi-row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--muted)}.goal-info .gi-row b{color:var(--txt)}
.goal-edit{font-size:11px;color:var(--brand-2);cursor:pointer;margin-top:6px;display:inline-block}
.chart{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:10px}.cbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%}
.cbar{width:100%;max-width:38px;background:linear-gradient(180deg,var(--brand-2),var(--brand));border-radius:7px 7px 0 0;transition:height .8s;position:relative;margin-top:auto;min-height:3px}
.cbar .cbv{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap}.cbar-wrap .cbl{font-size:11px;color:var(--muted2)}
.board{display:flex;gap:15px;align-items:flex-start;overflow-x:auto;padding-bottom:20px;min-height:60vh}
.col{background:var(--bg2);border:1px solid var(--line);border-radius:16px;width:288px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 210px)}
.col-head{display:flex;align-items:center;gap:9px;padding:14px 15px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.col-head .cdot{width:9px;height:9px;border-radius:3px}.col-head .cname{font-weight:700;font-size:13px}
.col-head .ccount{margin-inline-start:auto;background:var(--surface);border:1px solid var(--line);font-size:10.5px;font-weight:700;color:var(--muted);padding:1px 9px;border-radius:20px}
.col-head .cval{font-size:10.5px;color:var(--muted2);flex-basis:100%}
.col-body{padding:11px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1;min-height:60px}
.col-body.dragover{background:rgba(47,111,237,.08);outline:2px dashed rgba(47,111,237,.4);outline-offset:-8px;border-radius:12px}
.card{background:linear-gradient(160deg,var(--surface),var(--surface2));border:1px solid var(--line);border-radius:13px;padding:13px;cursor:grab;transition:.16s;position:relative}
.card:hover{border-color:var(--brand);transform:translateY(-2px)}.card.dragging{opacity:.4}
.card.rot{border-color:rgba(245,185,64,.5)}.card.rot::after{content:"";position:absolute;top:10px;inset-inline-end:10px;width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 8px var(--warn)}
.card .ctitle{font-weight:700;font-size:13.5px;margin-bottom:3px}.card .csub{font-size:11.5px;color:var(--muted);margin-bottom:8px}
.card .cmeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.chip{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--bg);border:1px solid var(--line);color:var(--muted)}
.chip.money{color:var(--good);border-color:rgba(34,192,125,.3);background:rgba(34,192,125,.08)}
.card .cfoot{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.avatar{width:23px;height:23px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:#fff}
.card .cdate{font-size:10.5px;color:var(--muted2);margin-inline-start:auto}
.add-card{padding:10px;text-align:center;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;border:1px dashed var(--line2);border-radius:11px;margin:0 11px 11px}
.add-card:hover{color:var(--brand-2);border-color:var(--brand)}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px}
.hcard{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:17px;cursor:pointer;transition:.16s}
.hcard:hover{border-color:var(--brand);transform:translateY(-3px)}.hcard .hh{display:flex;align-items:center;gap:11px;margin-bottom:13px}.hcard .hname{font-weight:700;font-size:14.5px}
.hcard .hrow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--muted)}.hcard .hrow b{color:var(--txt)}
.pill{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;margin-inline-start:auto}
.pill.good{background:rgba(34,192,125,.12);color:var(--good)}.pill.warn{background:rgba(245,185,64,.12);color:var(--warn)}.pill.bad{background:rgba(244,104,95,.12);color:var(--bad)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}.tbl th{text-align:start;color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:12px;border-bottom:1px solid var(--line)}.tbl tr{cursor:pointer}.tbl tr:hover{background:var(--surface)}
.st-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.st-p{background:rgba(34,192,125,.14);color:var(--good)}.st-u{background:rgba(245,185,64,.14);color:var(--warn)}.st-r{background:rgba(244,104,95,.14);color:var(--bad)}
.chkbox{width:19px;height:19px;border-radius:6px;border:2px solid var(--line2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.chkbox.done{background:var(--good);border-color:var(--good)}.chkbox.done svg{width:12px;height:12px;color:#fff}
.task-done td{opacity:.5;text-decoration:line-through}.overdue-txt{color:var(--bad);font-weight:700}
.agenda-day{margin-bottom:18px}.agenda-date{font-size:12px;font-weight:700;color:var(--brand-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.agenda-date .bar{height:1px;flex:1;background:var(--line)}
.ev{display:flex;align-items:center;gap:12px;padding:12px 15px;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.ev .evdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.ev .evt{font-size:13px;font-weight:600}.ev .evtype{margin-inline-start:auto;font-size:11px;color:var(--muted2)}
.lb{display:flex;flex-direction:column;gap:11px}.lb-row{display:flex;align-items:center;gap:14px;padding:15px 18px;background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:15px}
.lb-row.top{border-color:var(--gold)}.lb-medal{font-size:22px;width:34px;text-align:center;flex-shrink:0}
.lb-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
.lb-name{font-weight:800;font-size:15px}.lb-role{font-size:11.5px;color:var(--muted2)}
.lb-stats{margin-inline-start:auto;display:flex;gap:24px;text-align:center}.lb-stat b{font-size:18px;font-weight:800;display:block}.lb-stat span{font-size:10px;color:var(--muted2);text-transform:uppercase}
.tpl{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:15px;padding:17px;cursor:pointer}.tpl:hover{border-color:var(--brand)}
.tpl .tcat{font-size:10px;font-weight:700;color:var(--brand-2);text-transform:uppercase}.tpl .ttitle{font-weight:700;font-size:15px;margin:5px 0 8px}
.tpl .tbody{font-size:12.5px;color:var(--muted);line-height:1.6;white-space:pre-wrap;max-height:120px;overflow:hidden}.tpl .tcopy{margin-top:12px;font-size:11.5px;color:var(--brand-2);font-weight:700}
.c360-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.c360-item{padding:15px 17px;background:var(--surface);border:1px solid var(--line);border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:12px}.c360-item:hover{border-color:var(--brand)}
.c360-item .cn{font-weight:700;font-size:14px}.c360-item .cs{font-size:11px;color:var(--muted2)}
.tl{position:relative;padding-inline-start:24px}.tl::before{content:"";position:absolute;inset-inline-start:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:10px 0}.tl-item::before{content:"";position:absolute;inset-inline-start:-22px;top:14px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg);background:var(--brand)}
.tl-item .tt{font-size:13px;font-weight:600}.tl-item .ts{font-size:11px;color:var(--muted2)}
.overlay{position:fixed;inset:0;background:rgba(4,7,13,.74);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line2);border-radius:20px;width:100%;max-width:480px;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}.modal.wide{max-width:600px}
.modal-head{display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:1px solid var(--line)}.modal-head h3{font-size:16px;font-weight:800}
.modal-head .x{margin-inline-start:auto;width:31px;height:31px;border-radius:9px;background:var(--surface);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:11px 13px;font-size:14px;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}.field textarea{resize:vertical;min-height:66px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.cmd-overlay{position:fixed;inset:0;background:rgba(4,7,13,.6);backdrop-filter:blur(4px);z-index:150;display:none;align-items:flex-start;justify-content:center;padding-top:14vh}.cmd-overlay.open{display:flex}
.cmd-box{width:100%;max-width:540px;background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.cmd-box input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--txt);padding:17px 20px;font-size:16px;outline:none}
.cmd-list{max-height:340px;overflow-y:auto;padding:8px}.cmd-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:600}
.cmd-row.sel,.cmd-row:hover{background:var(--brand);color:#fff}.cmd-row .cic{width:17px;height:17px;color:var(--muted)}.cmd-row.sel .cic,.cmd-row:hover .cic{color:#fff}
.toast-wrap{position:fixed;bottom:24px;inset-inline-end:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface2);border:1px solid var(--line2);border-inline-start:3px solid var(--good);border-radius:12px;padding:12px 17px;font-size:13px;font-weight:600;box-shadow:var(--shadow);min-width:180px}
.empty{text-align:center;color:var(--muted2);padding:50px;font-size:14px}
.confetti{position:fixed;width:9px;height:14px;z-index:300;pointer-events:none;top:-20px}
.login-ov{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;background-image:radial-gradient(800px 400px at 50% 0%,rgba(47,111,237,.2),transparent 60%)}
.login-ov img{max-width:280px;max-height:80px;object-fit:contain;margin-bottom:4px}
.login-ov h2{font-size:22px;font-weight:800}
.login-langs{display:flex;gap:10px}.login-langs .lg{padding:8px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--line);font-weight:700;font-size:13px;color:var(--muted);cursor:pointer}.login-langs .lg.on{background:var(--brand);color:#fff;border-color:transparent}
.login-users{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:520px}
.luser{padding:14px 20px;background:var(--surface);border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:110px}
.luser:hover{border-color:var(--brand);transform:translateY(-3px)}.luser .lav{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px}
.luser .ln{font-weight:700;font-size:13px}.luser .lr{font-size:11px;color:var(--muted2)}.luser.add{border-style:dashed;color:var(--muted)}
.luser .llock{font-size:10px;color:var(--muted2);margin-top:-4px}
.login-pass{display:flex;flex-direction:column;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px 32px;min-width:280px;box-shadow:var(--shadow)}
.login-pass .lp-name{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px}
.login-pass input{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 14px;color:var(--txt);font-size:15px;text-align:center;min-width:220px}
.login-pass input:focus{outline:none;border-color:var(--brand)}
.login-pass .lp-err{color:var(--bad);font-size:12.5px;font-weight:600;display:none}
.login-pass .lp-actions{display:flex;gap:10px}
pre.report{white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.6;color:var(--txt);background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:16px;max-height:50vh;overflow:auto}
.tour-ov{position:fixed;inset:0;background:rgba(4,7,13,.8);backdrop-filter:blur(3px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.tour-ov.open{display:flex}
.tour-card{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--brand);border-radius:20px;max-width:440px;padding:30px;box-shadow:0 30px 80px -30px var(--brand);text-align:center}
.tour-card .temoji{font-size:44px}.tour-card h3{font-size:20px;font-weight:800;margin:12px 0 8px}
.tour-card p{color:var(--muted);font-size:14px;line-height:1.65}
.tour-dots{display:flex;gap:6px;justify-content:center;margin:20px 0}
.tour-dots span{width:8px;height:8px;border-radius:50%;background:var(--line2)}.tour-dots span.on{background:var(--brand);width:22px;border-radius:6px}
.tour-foot{display:flex;gap:10px;justify-content:center}
</style>

renderCurrent=function(){if(ADMINONLY.indexOf(current)>=0&&!isAdmin())current="dashboard";var s=SYSTEMS[current];if(s.docs){document.getElementById("pageTitle").textContent=t(s.key);document.getElementById("pageSub").textContent=t(s.key+"S");document.getElementById("addBtn").style.display="inline-flex";document.getElementById("importLeadsBtn").style.display="none";document.getElementById("toggleMine").style.display="none";var c=document.getElementById("content");c.className="content fade";return renderDocs(c);}if(s.activityLog||s.insights){document.getElementById("pageTitle").textContent=t(s.key);document.getElementById("pageSub").textContent=t(s.key+"S");document.getElementById("addBtn").style.display="none";document.getElementById("importLeadsBtn").style.display="none";document.getElementById("toggleMine").style.display="none";var c2=document.getElementById("content");c2.className="content fade";return s.insights?renderInsights(c2):renderActivity(c2);}return _origRenderCurrent();};
